<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home — Ace Manager</title>
  <link rel="stylesheet" href="css/styles.css?v=20260722235326" />
</head>
<body>
  <div id="sidebarHost"></div>

  <main class="ace-app-main">
    <div class="page-content">
      <div class="homepage">
        <header class="home-header">
          <h1 id="homeGreeting">Welcome to Ace Manager</h1>
          <div id="homeSubtitle" class="muted"></div>
        </header>

        <section class="home-section">
          <h2 class="section-title">Needs Attention</h2>
          <div id="needsAttention" class="attention-grid">
            <div class="empty-state"><div class="muted">Loading…</div></div>
          </div>
        </section>

        <section class="home-section" id="recentMeetingsSection">
          <h2 class="section-title">Recent Meetings</h2>
          <div id="recentMeetings" class="recent-meetings-stack"></div>
        </section>

        <section class="home-section">
          <details class="home-calendar">
            <summary class="home-calendar-summary">
              <span class="section-title" style="margin:0;">Month Calendar</span>
              <span class="home-calendar-hint muted">show / hide</span>
            </summary>
            <div id="calendarHost"></div>
          </details>
        </section>

        <section class="home-section" id="recentActivitySection" style="display:none;">
          <h2 class="section-title">Recent Activity</h2>
          <div id="recentActivity"></div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260722235326"></script>
  <script src="js/utils.js?v=20260722235326"></script>
  <script src="js/auth.js?v=20260722235326"></script>
  <script src="js/router.js?v=20260722235326"></script>
  <script src="js/sidebar.js?v=20260722235326"></script>
  <script src="js/modal.js?v=20260722235326"></script>
  <script src="js/toast.js?v=20260722235326"></script>
  <script src="js/store.js?v=20260722235326"></script>
  <script src="js/status.js?v=20260722235326"></script>
  <script src="js/icons.js?v=20260722235326"></script>
  <script src="js/calendar.js?v=20260722235326"></script>
  <script src="js/meetings.js?v=20260722235326"></script>
  <script src="js/compliance.js?v=20260722235326"></script>
  <script src="js/homepage.js?v=20260722235326"></script>
  <script src="js/app.js?v=20260722235326"></script>

</body>
</html>
