<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ace Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="ace-header">
    <div class="ace-header-inner">
      <h1 class="ace-logo">ACE MANAGER</h1>
      <button id="logoutBtn" class="header-btn">Log Out</button>
    </div>
  </header>

  <main class="ace-main">
    <div class="ace-card">
      <h2 id="greeting">Welcome to Ace Manager</h2>
      <p class="muted">Phase 1.3 — Authentication is live. Phase 1.4 (sidebar + caseload) coming next.</p>
    </div>
  </main>

  <footer class="ace-footer">
    Created by Consult Granato Education LLC · v0.3
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
          await window.aceAuth.signOut();
          window.aceRouter.toLogin();
        });
      }
    });
  </script>
</body>
</html>
