<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Ace Manager</title>
  <link rel="stylesheet" href="../css/styles.css?v=20260619014103" />
</head>
<body>
  <header class="ace-header">
    <div class="ace-header-inner">
      <img src="../assets/vikings-logo.jpg" alt="Niles North Vikings" class="ace-header-logo" />
      <h1 class="ace-logo">ACE MANAGER</h1>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-logo-wrap">
      <img src="../assets/vikings-logo.jpg" alt="Niles North Vikings" class="auth-page-logo" />
    </div>
    <div class="auth-card">
      <h2 id="cardTitle">Reset Your Password</h2>

      <form id="requestResetForm">
        <p class="muted">Enter your email and we'll send you a link to reset your password.</p>
        <label>Email
          <input type="email" id="resetEmail" required autocomplete="email" />
        </label>
        <div id="errorMsg" class="error-msg" style="display:none;"></div>
        <div id="successMsg" class="success-msg" style="display:none;"></div>
        <button type="submit" class="btn-primary">Send Reset Link</button>
      </form>

      <form id="newPasswordForm" style="display:none;">
        <p class="muted">Enter your new password.</p>
        <label>New Password
          <input type="password" id="newPassword" required minlength="8" autocomplete="new-password" />
        </label>
        <div id="errorMsg2" class="error-msg" style="display:none;"></div>
        <div id="successMsg2" class="success-msg" style="display:none;"></div>
        <button type="submit" class="btn-primary">Update Password</button>
      </form>

      <div class="auth-links">
        <a href="login.html">Back to login</a>
      </div>
    </div>
  </main>

  <footer class="ace-footer">
    Created by Consult Granato Education LLC · v0.3
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js?v=20260619014103"></script>
  <script src="../js/utils.js?v=20260619014103"></script>
  <script src="../js/auth.js?v=20260619014103"></script>
  <script src="../js/router.js?v=20260619014103"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.hash.substring(1));
      const hasResetToken = params.has('access_token') && params.get('type') === 'recovery';

      const requestForm = document.getElementById('requestResetForm');
      const newPwForm = document.getElementById('newPasswordForm');
      const cardTitle = document.getElementById('cardTitle');

      if (hasResetToken) {
        requestForm.style.display = 'none';
        newPwForm.style.display = 'block';
        cardTitle.textContent = 'Set New Password';
      }

      requestForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        const email = document.getElementById('resetEmail').value;
        const { error } = await window.aceAuth.resetPassword(email);
        if (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
        } else {
          successMsg.textContent = 'Check your email for the reset link.';
          successMsg.style.display = 'block';
        }
      });

      newPwForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('errorMsg2');
        const successMsg = document.getElementById('successMsg2');
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        const newPassword = document.getElementById('newPassword').value;
        const { error } = await window.aceAuth.updatePassword(newPassword);
        if (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
        } else {
          successMsg.textContent = 'Password updated! Redirecting to login...';
          successMsg.style.display = 'block';
          setTimeout(() => window.aceRouter.toLogin(), 2000);
        }
      });
    });
  </script>
</body>
</html>
