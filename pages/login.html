<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Ace Manager</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <header class="ace-header">
    <div class="ace-header-inner">
      <h1 class="ace-logo">ACE MANAGER</h1>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h2>Log In</h2>
      <form id="loginForm">
        <label>Email
          <input type="email" id="email" required autocomplete="email" />
        </label>
        <label>Password
          <input type="password" id="password" required autocomplete="current-password" />
        </label>
        <div id="errorMsg" class="error-msg" style="display:none;"></div>
        <button type="submit" class="btn-primary">Log In</button>
      </form>
      <div class="auth-links">
        <a href="reset-password.html">Forgot password?</a>
        <span>·</span>
        <a href="signup.html">Create account</a>
      </div>
    </div>
  </main>

  <footer class="ace-footer">
    Created by Consult Granato Education LLC · v0.3
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      const errorMsg = document.getElementById('errorMsg');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await window.aceAuth.signIn(email, password);
        if (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
        } else {
          window.aceRouter.toHome();
        }
      });
    });
  </script>
</body>
</html>
